<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>a11y-checker</title>
<style>
  :root {
    --critical: #ff4444;
    --serious: #cc7a00;
    --moderate: #b8960c;
    --minor: #4488cc;
    --bg: #0a0a0a;
    --surface: #111111;
    --grid: #1a1a1a;
    --border: #222222;
    --text: #d0d0d0;
    --muted: #666666;
    --accent: #ffffff;
    --dim: #333333;
    --green: #44aa44;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "SF Mono", "Fira Code", "JetBrains Mono", "Cascadia Code", monospace;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .app {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .app-header {
    text-align: center;
    padding: 2rem 0 1.5rem;
  }

  .app-header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
    margin-bottom: 0.2rem;
  }

  .app-header .tagline {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  .url-form {
    display: flex;
    gap: 0;
    width: 100%;
    max-width: 600px;
    margin: 0 auto 0.5rem;
  }

  .url-form input[type="url"] {
    flex: 1;
    padding: 0.6rem 0.9rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-right: none;
    border-radius: 4px 0 0 4px;
    color: var(--accent);
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
  }

  .url-form input[type="url"]:focus { border-color: var(--dim); }
  .url-form input[type="url"]::placeholder { color: var(--muted); }

  .url-form button {
    padding: 0.6rem 1.4rem;
    background: var(--accent);
    color: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 0 4px 4px 0;
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  .url-form button:hover { background: #e0e0e0; }

  .hint {
    text-align: center;
    font-size: 0.7rem;
    color: var(--dim);
    margin-bottom: 2rem;
  }

  .hint a { color: var(--muted); }

  /* --- REPORT SELECTOR --- */
  .report-bar {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin-bottom: 1rem;
  }

  .report-bar label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
  }

  .report-bar select {
    flex: 1;
    max-width: 480px;
    padding: 0.4rem 0.6rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--accent);
    font-family: inherit;
    font-size: 0.8rem;
    outline: none;
  }

  .report-bar select:focus { border-color: var(--dim); }

  /* --- DASHBOARD --- */
  .dashboard { display: none; }
  .dashboard.active { display: block; }

  .summary {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 0.75rem;
  }

  .counter {
    padding: 0.25rem 0.6rem;
    border-radius: 3px;
    font-size: 0.75rem;
    font-weight: 600;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .counter.critical { border-left: 3px solid var(--critical); }
  .counter.serious { border-left: 3px solid var(--serious); }
  .counter.moderate { border-left: 3px solid var(--moderate); }
  .counter.minor { border-left: 3px solid var(--minor); }

  .toolbar {
    padding: 0.5rem 0;
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 0.75rem;
  }

  .toolbar .label-text {
    font-size: 0.72rem;
    color: var(--muted);
    margin-right: 0.15rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .toggle {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
    font-size: 0.75rem;
    cursor: pointer;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    transition: opacity 0.15s;
  }

  .toggle.off { opacity: 0.3; }
  .toggle input { display: none; }
  .spacer { flex: 1; }

  .export-group { display: flex; gap: 0.3rem; }

  button.export-btn {
    padding: 0.25rem 0.6rem;
    border-radius: 3px;
    font-size: 0.72rem;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    cursor: pointer;
  }

  button.export-btn:hover { border-color: var(--muted); }

  .meta {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  #log {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    max-height: 65vh;
    overflow-y: auto;
  }

  .entry {
    padding: 0.4rem 0.65rem;
    border-radius: 3px;
    font-size: 0.78rem;
    background: var(--surface);
    border-left: 3px solid var(--border);
    word-break: break-word;
  }

  .entry.critical { border-left-color: var(--critical); }
  .entry.serious { border-left-color: var(--serious); }
  .entry.moderate { border-left-color: var(--moderate); }
  .entry.minor { border-left-color: var(--minor); }

  .entry .impact {
    display: inline-block;
    padding: 0.05rem 0.35rem;
    border-radius: 2px;
    font-size: 0.7rem;
    font-weight: 600;
    margin-right: 0.3rem;
  }

  .entry.critical .impact { background: var(--critical); color: #fff; }
  .entry.serious .impact { background: var(--serious); color: #fff; }
  .entry.moderate .impact { background: var(--moderate); color: #000; }
  .entry.minor .impact { background: var(--minor); color: #fff; }

  .entry .url { color: var(--muted); }
  .entry .rule { font-weight: 600; color: var(--accent); }
  .entry a { color: var(--minor); text-decoration: none; }
  .entry a:hover { text-decoration: underline; }
  .entry .target { color: var(--muted); font-size: 0.72rem; }

  .entry .viewport-badge {
    display: inline-block;
    font-size: 0.65rem;
    padding: 0.02rem 0.25rem;
    border-radius: 2px;
    border: 1px solid var(--border);
    margin-left: 0.25rem;
  }

  .empty-state {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--dim);
    font-size: 0.8rem;
  }

  footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    font-size: 0.72rem;
    color: var(--dim);
    text-align: center;
  }

  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 600px) {
    .app-header h1 { font-size: 1.3rem; }
    .app { padding: 1.5rem 1rem; }
    .url-form { flex-direction: column; }
    .url-form input[type="url"] { border-right: 1px solid var(--border); border-radius: 4px 4px 0 0; }
    .url-form button { border-radius: 0 0 4px 4px; }
    .report-bar select { max-width: 100%; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="app-header">
    <h1>a11y-checker</h1>
    <p class="tagline">WCAG 2.1 AA accessibility auditor &middot; axe-core + playwright</p>
    <form class="url-form" id="url-form">
      <input type="url" id="url-input" placeholder="https://example.com" required autofocus>
      <button type="submit">Audit</button>
    </form>
    <p class="hint">opens a GitHub issue to trigger the audit &middot; results appear below when complete</p>
  </div>

  <div class="report-bar">
    <label>Report:</label>
    <select id="report-select">
      <option value="">loading...</option>
    </select>
  </div>

  <div class="dashboard" id="dashboard">
    <div class="meta" id="meta"></div>
    <div class="summary" id="summary"></div>

    <div class="toolbar">
      <span class="label-text">Severity:</span>
      <label class="toggle" data-filter="critical"><input type="checkbox" checked>critical</label>
      <label class="toggle" data-filter="serious"><input type="checkbox" checked>serious</label>
      <label class="toggle" data-filter="moderate"><input type="checkbox" checked>moderate</label>
      <label class="toggle" data-filter="minor"><input type="checkbox" checked>minor</label>
      <span class="label-text" style="margin-left:0.75rem">Viewport:</span>
      <label class="toggle" data-filter="desktop"><input type="checkbox" checked>desktop</label>
      <label class="toggle" data-filter="mobile"><input type="checkbox" checked>mobile</label>
      <span class="spacer"></span>
      <div class="export-group">
        <button class="export-btn" id="export-json">JSON</button>
        <button class="export-btn" id="export-csv">CSV</button>
      </div>
    </div>

    <div id="log"></div>
  </div>

  <div class="empty-state" id="empty-state"></div>

  <footer>
    <a href="https://github.com/zmuhls/a11y-checker">github.com/zmuhls/a11y-checker</a> &middot; MIT
  </footer>

</div>

<script>
const OWNER = "zmuhls";
const REPO = "a11y-checker";

const reportSelect = document.getElementById("report-select");
const dashboard = document.getElementById("dashboard");
const emptyState = document.getElementById("empty-state");
const logEl = document.getElementById("log");
const metaEl = document.getElementById("meta");
const summaryEl = document.getElementById("summary");

const filters = { critical: true, serious: true, moderate: true, minor: true, desktop: true, mobile: true };
let currentReport = null;

// --- Audit trigger: opens pre-filled GitHub issue ---
document.getElementById("url-form").addEventListener("submit", (e) => {
  e.preventDefault();
  const url = document.getElementById("url-input").value.trim();
  if (!url) return;

  const title = encodeURIComponent(`audit: ${url}`);
  const body = encodeURIComponent(
    `Requesting an accessibility audit for:\n\n\`${url}\`\n\n` +
    `This issue was created from the [a11y-checker dashboard](https://${OWNER}.github.io/${REPO}/).\n` +
    `The audit workflow will run automatically and post results here.`
  );

  window.open(
    `https://github.com/${OWNER}/${REPO}/issues/new?title=${title}&body=${body}&labels=audit`,
    "_blank"
  );
});

// --- Filters ---
document.querySelectorAll(".toggle").forEach((label) => {
  const cb = label.querySelector("input");
  const key = label.dataset.filter;
  cb.addEventListener("change", () => {
    filters[key] = cb.checked;
    label.classList.toggle("off", !cb.checked);
    applyFilters();
  });
});

function applyFilters() {
  logEl.querySelectorAll(".entry").forEach((el) => {
    const show = filters[el.dataset.impact] !== false && filters[el.dataset.viewport] !== false;
    el.style.display = show ? "" : "none";
  });
}

// --- Load reports ---
async function loadIndex() {
  try {
    const res = await fetch("results/index.json", { cache: "no-store" });
    if (!res.ok) throw new Error("No results");
    const index = await res.json();
    if (!index.length) throw new Error("Empty");

    reportSelect.innerHTML = "";
    for (const entry of index) {
      const opt = document.createElement("option");
      opt.value = entry.file;
      const date = new Date(entry.timestamp).toLocaleDateString("en-US", {
        month: "short", day: "numeric", year: "numeric",
        hour: "2-digit", minute: "2-digit",
      });
      const host = safeHost(entry.url);
      opt.textContent = `${host} — ${entry.totalViolations} violations — ${date}`;
      reportSelect.appendChild(opt);
    }

    reportSelect.addEventListener("change", () => loadReport(reportSelect.value));
    loadReport(index[0].file);
  } catch (_) {
    reportSelect.innerHTML = "<option value=''>no reports yet</option>";
    emptyState.textContent = "Enter a URL above to run your first audit.";
    emptyState.style.display = "block";
    dashboard.classList.remove("active");
  }
}

async function loadReport(file) {
  if (!file) return;
  try {
    const res = await fetch(`results/${file}`, { cache: "no-store" });
    currentReport = await res.json();
    renderReport(currentReport);
  } catch (err) {
    logEl.innerHTML = `<div class="entry" style="color:var(--critical)">failed to load report: ${escHtml(err.message)}</div>`;
  }
}

function renderReport(report) {
  emptyState.style.display = "none";
  dashboard.classList.add("active");

  const host = safeHost(report.url);
  const date = new Date(report.timestamp).toLocaleDateString("en-US", {
    weekday: "short", month: "short", day: "numeric", year: "numeric",
    hour: "2-digit", minute: "2-digit",
  });
  metaEl.innerHTML = `<strong>${escHtml(host)}</strong> &middot; ${report.totalPages} pages &middot; ${date}`;

  const counts = { critical: 0, serious: 0, moderate: 0, minor: 0 };
  for (const v of report.violations) {
    counts[v.impact] = (counts[v.impact] || 0) + 1;
  }

  summaryEl.innerHTML = `
    <div class="counter">${report.totalViolations} total</div>
    <div class="counter critical">${counts.critical} critical</div>
    <div class="counter serious">${counts.serious} serious</div>
    <div class="counter moderate">${counts.moderate} moderate</div>
    <div class="counter minor">${counts.minor} minor</div>
  `;

  logEl.innerHTML = "";
  for (const v of report.violations) {
    const div = document.createElement("div");
    div.className = `entry ${v.impact}`;
    div.dataset.impact = v.impact;
    div.dataset.viewport = v.viewport;
    div.innerHTML = `
      <span class="impact">${v.impact}</span>
      <span class="rule">${escHtml(v.ruleId)}</span>
      <span class="viewport-badge">${v.viewport}</span>
      — ${escHtml(v.help)}
      <br><span class="target">${escHtml(v.target)}</span>
      <br><span class="url">${escHtml(v.url)}</span>
      ${v.helpUrl ? ` &middot; <a href="${escAttr(v.helpUrl)}" target="_blank" rel="noopener">docs</a>` : ""}
      ${v.wcagTags && v.wcagTags.length ? ` &middot; <span class="url">${escHtml(v.wcagTags.join(", "))}</span>` : ""}
    `;
    const show = filters[v.impact] !== false && filters[v.viewport] !== false;
    if (!show) div.style.display = "none";
    logEl.appendChild(div);
  }
}

// --- Export ---
document.getElementById("export-json").addEventListener("click", () => {
  if (!currentReport) return;
  downloadBlob(JSON.stringify(currentReport, null, 2), "a11y-report.json", "application/json");
});

document.getElementById("export-csv").addEventListener("click", () => {
  if (!currentReport) return;
  const header = "url,viewport,impact,ruleId,help,target,wcagTags,helpUrl\n";
  const rows = currentReport.violations.map((v) =>
    [v.url, v.viewport, v.impact, v.ruleId,
     `"${(v.help || "").replace(/"/g, '""')}"`,
     `"${(v.target || "").replace(/"/g, '""')}"`,
     `"${(v.wcagTags || []).join("; ")}"`,
     v.helpUrl || ""].join(",")
  ).join("\n");
  downloadBlob(header + rows, "a11y-report.csv", "text/csv");
});

function downloadBlob(content, filename, type) {
  const blob = new Blob([content], { type });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function safeHost(url) {
  try { return new URL(url).hostname; } catch (_) { return url; }
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s || "";
  return d.innerHTML;
}

function escAttr(s) {
  return (s || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

loadIndex();
</script>
</body>
</html>
