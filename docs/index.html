<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>a11y-checker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/axe-core/4.9.1/axe.min.js"></script>
<style>
  :root {
    --critical: #ff4444;
    --serious: #cc7a00;
    --moderate: #b8960c;
    --minor: #4488cc;
    --bg: #0a0a0a;
    --surface: #111111;
    --grid: #1a1a1a;
    --border: #222222;
    --text: #d0d0d0;
    --muted: #666666;
    --accent: #ffffff;
    --dim: #333333;
    --green: #44aa44;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "SF Mono", "Fira Code", "JetBrains Mono", "Cascadia Code", monospace;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    min-height: 100vh;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .app {
    max-width: 960px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .app-header {
    text-align: center;
    padding: 2rem 0 1.5rem;
  }

  .app-header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
    margin-bottom: 0.2rem;
  }

  .app-header .tagline {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
  }

  .url-form {
    display: flex;
    gap: 0;
    width: 100%;
    max-width: 600px;
    margin: 0 auto 0.5rem;
  }

  .url-form input[type="url"] {
    flex: 1;
    padding: 0.6rem 0.9rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-right: none;
    border-radius: 4px 0 0 4px;
    color: var(--accent);
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
  }

  .url-form input[type="url"]:focus { border-color: var(--dim); }
  .url-form input[type="url"]::placeholder { color: var(--muted); }

  .url-form button {
    padding: 0.6rem 1.4rem;
    background: var(--accent);
    color: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 0 4px 4px 0;
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  .url-form button:hover { background: #e0e0e0; }
  .url-form button:disabled { opacity: 0.4; cursor: default; }

  .hint {
    text-align: center;
    font-size: 0.7rem;
    color: var(--dim);
    margin-bottom: 2rem;
  }

  /* --- DASHBOARD --- */
  .dashboard { display: none; }
  .dashboard.active { display: block; }

  .progress {
    padding: 0.5rem 0.75rem;
    font-size: 0.78rem;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .spinner {
    width: 12px;
    height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .summary {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-bottom: 0.75rem;
  }

  .counter {
    padding: 0.25rem 0.6rem;
    border-radius: 3px;
    font-size: 0.75rem;
    font-weight: 600;
    background: var(--surface);
    border: 1px solid var(--border);
  }

  .counter.critical { border-left: 3px solid var(--critical); }
  .counter.serious { border-left: 3px solid var(--serious); }
  .counter.moderate { border-left: 3px solid var(--moderate); }
  .counter.minor { border-left: 3px solid var(--minor); }

  .toolbar {
    padding: 0.5rem 0;
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 0.75rem;
  }

  .toolbar .label-text {
    font-size: 0.72rem;
    color: var(--muted);
    margin-right: 0.15rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .toggle {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.2rem 0.5rem;
    border-radius: 3px;
    font-size: 0.75rem;
    cursor: pointer;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    transition: opacity 0.15s;
  }

  .toggle.off { opacity: 0.3; }
  .toggle input { display: none; }
  .spacer { flex: 1; }

  .export-group { display: flex; gap: 0.3rem; }

  button.export-btn {
    padding: 0.25rem 0.6rem;
    border-radius: 3px;
    font-size: 0.72rem;
    font-family: inherit;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    cursor: pointer;
  }

  button.export-btn:hover { border-color: var(--muted); }
  button.export-btn:disabled { opacity: 0.3; cursor: default; }

  #log {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
    max-height: 65vh;
    overflow-y: auto;
  }

  .entry {
    padding: 0.4rem 0.65rem;
    border-radius: 3px;
    font-size: 0.78rem;
    background: var(--surface);
    border-left: 3px solid var(--border);
    word-break: break-word;
  }

  .entry.critical { border-left-color: var(--critical); }
  .entry.serious { border-left-color: var(--serious); }
  .entry.moderate { border-left-color: var(--moderate); }
  .entry.minor { border-left-color: var(--minor); }
  .entry.status { border-left-color: var(--green); color: var(--muted); }
  .entry.error { border-left-color: var(--critical); color: #cc6666; }

  .entry .impact {
    display: inline-block;
    padding: 0.05rem 0.35rem;
    border-radius: 2px;
    font-size: 0.7rem;
    font-weight: 600;
    margin-right: 0.3rem;
  }

  .entry.critical .impact { background: var(--critical); color: #fff; }
  .entry.serious .impact { background: var(--serious); color: #fff; }
  .entry.moderate .impact { background: var(--moderate); color: #000; }
  .entry.minor .impact { background: var(--minor); color: #fff; }

  .entry code {
    background: var(--bg);
    padding: 0.1rem 0.35rem;
    border-radius: 3px;
    font-size: 0.75rem;
  }
  .entry .url { color: var(--muted); }
  .entry .rule { font-weight: 600; color: var(--accent); }
  .entry a { color: var(--minor); text-decoration: none; }
  .entry a:hover { text-decoration: underline; }
  .entry .target { color: var(--muted); font-size: 0.72rem; }

  footer {
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
    font-size: 0.72rem;
    color: var(--dim);
    text-align: center;
  }

  footer a { color: var(--muted); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  #audit-frame {
    position: absolute;
    left: -9999px;
    top: -9999px;
    width: 1280px;
    height: 800px;
    border: none;
  }

  @media (max-width: 600px) {
    .app-header h1 { font-size: 1.3rem; }
    .app { padding: 1.5rem 1rem; }
    .url-form { flex-direction: column; }
    .url-form input[type="url"] { border-right: 1px solid var(--border); border-radius: 4px 4px 0 0; }
    .url-form button { border-radius: 0 0 4px 4px; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="app-header">
    <h1>a11y-checker</h1>
    <p class="tagline">WCAG 2.1 AA accessibility auditor &middot; runs in your browser</p>
    <form class="url-form" id="url-form">
      <input type="url" id="url-input" placeholder="https://example.com" required autofocus>
      <button type="submit" id="audit-btn">Audit</button>
    </form>
    <p class="hint">crawls pages via sitemap + link discovery &middot; checks against WCAG 2.1 AA &middot; up to 20 pages</p>
  </div>

  <div class="dashboard" id="dashboard">
    <div class="progress" id="progress">
      <div class="spinner" id="spinner"></div>
      <span id="progress-text">starting...</span>
    </div>

    <div class="summary" id="summary">
      <div class="counter" id="cnt-total">0 total</div>
      <div class="counter critical" id="cnt-critical">0 critical</div>
      <div class="counter serious" id="cnt-serious">0 serious</div>
      <div class="counter moderate" id="cnt-moderate">0 moderate</div>
      <div class="counter minor" id="cnt-minor">0 minor</div>
    </div>

    <div class="toolbar">
      <span class="label-text">Severity:</span>
      <label class="toggle" data-filter="critical"><input type="checkbox" checked>critical</label>
      <label class="toggle" data-filter="serious"><input type="checkbox" checked>serious</label>
      <label class="toggle" data-filter="moderate"><input type="checkbox" checked>moderate</label>
      <label class="toggle" data-filter="minor"><input type="checkbox" checked>minor</label>
      <span class="spacer"></span>
      <div class="export-group">
        <button class="export-btn" id="export-json" disabled>JSON</button>
        <button class="export-btn" id="export-csv" disabled>CSV</button>
      </div>
    </div>

    <div id="log"></div>
  </div>

  <footer>
    <a href="https://github.com/milwrite/a11y-checker">github.com/milwrite/a11y-checker</a> &middot; MIT
  </footer>

</div>

<script>
// Production backend URL. Keep empty for local development.
const API = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"
  ? ""
  : "https://a11y-checker-production.up.railway.app";

const urlForm = document.getElementById("url-form");
const urlInput = document.getElementById("url-input");
const auditBtn = document.getElementById("audit-btn");
const dashboardEl = document.getElementById("dashboard");
const progressText = document.getElementById("progress-text");
const spinnerEl = document.getElementById("spinner");
const logEl = document.getElementById("log");
const exportJson = document.getElementById("export-json");
const exportCsv = document.getElementById("export-csv");

const counts = { total: 0, critical: 0, serious: 0, moderate: 0, minor: 0 };
const filters = { critical: true, serious: true, moderate: true, minor: true, desktop: true, mobile: true };
const allViolations = [];
let autoScroll = true;
let running = false;

// --- Filters ---
document.querySelectorAll(".toggle").forEach((label) => {
  const cb = label.querySelector("input");
  const key = label.dataset.filter;
  cb.addEventListener("change", () => {
    filters[key] = cb.checked;
    label.classList.toggle("off", !cb.checked);
    logEl.querySelectorAll(".entry.violation").forEach((el) => {
      const show = filters[el.dataset.impact] !== false && filters[el.dataset.viewport] !== false;
      el.style.display = show ? "" : "none";
    });
  });
});

logEl.addEventListener("scroll", () => {
  autoScroll = logEl.scrollTop + logEl.clientHeight >= logEl.scrollHeight - 40;
});

// --- Main ---
urlForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  if (running) return;
  const url = urlInput.value.trim();
  if (!url) return;

  running = true;
  auditBtn.disabled = true;
  auditBtn.textContent = "Running...";
  logEl.innerHTML = "";
  counts.total = counts.critical = counts.serious = counts.moderate = counts.minor = 0;
  allViolations.length = 0;
  updateCounters();
  exportJson.disabled = true;
  exportCsv.disabled = true;
  dashboardEl.classList.add("active");
  spinnerEl.style.display = "";
  progressText.textContent = "connecting to server...";

  try {
    // Trigger the audit on the backend
    const res = await fetch(`${API}/audit`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url }),
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Server error");

    progressText.textContent = "audit started — streaming results...";

    // Connect to SSE stream
    await streamResults();
  } catch (err) {
    addEntry(`error: ${escHtml(err.message)}`, "error");
    progressText.textContent = "failed";
    spinnerEl.style.display = "none";
  }

  auditBtn.disabled = false;
  auditBtn.textContent = "Audit";
  running = false;
});

function streamResults() {
  return new Promise((resolve) => {
    const es = new EventSource(`${API}/events`);

    es.addEventListener("status", (e) => {
      const d = JSON.parse(e.data);
      addEntry(escHtml(d.message), "status");
    });

    es.addEventListener("page-start", (e) => {
      const d = JSON.parse(e.data);
      progressText.textContent = `page ${d.pageIndex} — ${d.url}`;
      addEntry(`<strong>${d.pageIndex}:</strong> <span class="url">${escHtml(d.url)}</span>`, "status");
    });

    es.addEventListener("page-audit", (e) => {
      const d = JSON.parse(e.data);
      addEntry(`${d.viewport}: ${d.violationCount} violations, ${d.passCount} passed`, "status");
    });

    es.addEventListener("violation", (e) => {
      const d = JSON.parse(e.data);
      counts.total++;
      counts[d.impact] = (counts[d.impact] || 0) + 1;
      updateCounters();

      const v = {
        url: d.url,
        viewport: d.viewport,
        impact: d.impact,
        ruleId: d.ruleId,
        help: d.help,
        helpUrl: d.helpUrl,
        wcagTags: d.wcagTags || [],
        target: d.target,
        html: d.html,
      };
      allViolations.push(v);
      addViolation(v);
    });

    es.addEventListener("page-error", (e) => {
      const d = JSON.parse(e.data);
      addEntry(`error on ${escHtml(d.url)} (${d.viewport}): ${escHtml(d.error)}`, "error");
    });

    es.addEventListener("complete", (e) => {
      const d = JSON.parse(e.data);
      spinnerEl.style.display = "none";
      progressText.textContent = `complete — ${d.totalPages} pages, ${d.totalViolations} violations`;
      addEntry(`<strong>audit complete.</strong> ${d.totalPages} pages, ${d.totalViolations} violations.`, "status");
      exportJson.disabled = false;
      exportCsv.disabled = false;
      es.close();
      resolve();
    });

    es.addEventListener("error", () => {
      es.close();
      spinnerEl.style.display = "none";
      progressText.textContent = "connection lost";
      resolve();
    });
  });
}

// --- UI ---
function updateCounters() {
  document.getElementById("cnt-total").textContent = `${counts.total} total`;
  document.getElementById("cnt-critical").textContent = `${counts.critical} critical`;
  document.getElementById("cnt-serious").textContent = `${counts.serious} serious`;
  document.getElementById("cnt-moderate").textContent = `${counts.moderate} moderate`;
  document.getElementById("cnt-minor").textContent = `${counts.minor} minor`;
}

function addEntry(html, cls) {
  const div = document.createElement("div");
  div.className = `entry ${cls}`;
  div.innerHTML = html;
  logEl.appendChild(div);
  if (autoScroll) div.scrollIntoView({ behavior: "smooth", block: "end" });
}

function addViolation(v) {
  const div = document.createElement("div");
  div.className = `entry violation ${v.impact}`;
  div.dataset.impact = v.impact;
  div.dataset.viewport = v.viewport || "";
  const show = filters[v.impact] !== false && (!v.viewport || filters[v.viewport] !== false);
  div.innerHTML = `
    <span class="impact">${v.impact}</span>
    <span class="rule">${escHtml(v.ruleId)}</span>
    ${v.viewport ? `<span style="font-size:0.65rem;border:1px solid var(--border);padding:0.02rem 0.25rem;border-radius:2px;margin-left:0.25rem">${v.viewport}</span>` : ""}
    — ${escHtml(v.help)}
    <br><span class="target">${escHtml(v.target)}</span>
    <br><span class="url">${escHtml(v.url)}</span>
    ${v.helpUrl ? ` &middot; <a href="${escAttr(v.helpUrl)}" target="_blank" rel="noopener">docs</a>` : ""}
    ${v.wcagTags && v.wcagTags.length ? ` &middot; <span class="url">${escHtml(v.wcagTags.join(", "))}</span>` : ""}
  `;
  if (!show) div.style.display = "none";
  logEl.appendChild(div);
  if (autoScroll) div.scrollIntoView({ behavior: "smooth", block: "end" });
}

// --- Export ---
exportJson.addEventListener("click", () => {
  if (!allViolations.length) return;
  const report = {
    timestamp: new Date().toISOString(),
    totalViolations: allViolations.length,
    violations: allViolations,
  };
  downloadBlob(JSON.stringify(report, null, 2), "a11y-report.json", "application/json");
});

exportCsv.addEventListener("click", () => {
  if (!allViolations.length) return;
  const header = "url,viewport,impact,ruleId,help,target,wcagTags,helpUrl\n";
  const rows = allViolations.map((v) =>
    [v.url, v.viewport || "", v.impact, v.ruleId,
     `"${(v.help || "").replace(/"/g, '""')}"`,
     `"${(v.target || "").replace(/"/g, '""')}"`,
     `"${(v.wcagTags || []).join("; ")}"`,
     v.helpUrl || ""].join(",")
  ).join("\n");
  downloadBlob(header + rows, "a11y-report.csv", "text/csv");
});

function downloadBlob(content, filename, type) {
  const blob = new Blob([content], { type });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function escHtml(s) {
  const d = document.createElement("div");
  d.textContent = s || "";
  return d.innerHTML;
}

function escAttr(s) {
  return (s || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}
</script>
</body>
</html>
